[advisories]
yanked = "warn"
ignore = ["RUSTSEC-2026-0009"]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
]
[bans]
wildcards = "deny"
allow-wildcard-paths = true
deny = [
    # Each entry can be just a crate name, or a crate name and range as well.
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-git = []
